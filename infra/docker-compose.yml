services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resumely}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resumely_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-resumely}
    ports:
      - "5432:5432"
    volumes:
      - resumely_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumely} -d ${POSTGRES_DB:-resumely}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://resumely:resumely_dev_password@postgres:5432/resumely
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  resumely_postgres:
